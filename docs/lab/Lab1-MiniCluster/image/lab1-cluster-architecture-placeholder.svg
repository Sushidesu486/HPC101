<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Four-node cluster architecture placeholder</title>
  <desc id="desc">A placeholder diagram showing one control node connected to three compute nodes.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .control { fill: #e0f2fe; stroke: #0284c7; }
      .compute { fill: #ecfdf5; stroke: #059669; }
      .line { stroke: #64748b; stroke-width: 3; fill: none; stroke-linecap: round; }
      .title { fill: #0f172a; font: 700 28px Arial, sans-serif; }
      .label { fill: #0f172a; font: 700 22px Arial, sans-serif; }
      .text { fill: #334155; font: 18px Arial, sans-serif; }
      .muted { fill: #64748b; font: 16px Arial, sans-serif; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="420" rx="16" />
  <text class="title" x="480" y="52" text-anchor="middle">Control Node + Compute Nodes</text>
  <text class="muted" x="480" y="82" text-anchor="middle">placeholder for the four-node Lab 1 cluster diagram</text>

  <rect class="panel control" x="70" y="150" width="210" height="120" rx="10" />
  <text class="label" x="175" y="196" text-anchor="middle">node01</text>
  <text class="text" x="175" y="228" text-anchor="middle">Control Node</text>

  <line class="line" x1="280" y1="210" x2="405" y2="210" />
  <line class="line" x1="405" y1="120" x2="405" y2="300" />
  <line class="line" x1="405" y1="120" x2="535" y2="120" />
  <line class="line" x1="405" y1="210" x2="535" y2="210" />
  <line class="line" x1="405" y1="300" x2="535" y2="300" />

  <rect class="panel compute" x="535" y="65" width="250" height="90" rx="10" />
  <text class="label" x="660" y="104" text-anchor="middle">node02</text>
  <text class="text" x="660" y="132" text-anchor="middle">Compute Node</text>

  <rect class="panel compute" x="535" y="165" width="250" height="90" rx="10" />
  <text class="label" x="660" y="204" text-anchor="middle">node03</text>
  <text class="text" x="660" y="232" text-anchor="middle">Compute Node</text>

  <rect class="panel compute" x="535" y="265" width="250" height="90" rx="10" />
  <text class="label" x="660" y="304" text-anchor="middle">node04</text>
  <text class="text" x="660" y="332" text-anchor="middle">Compute Node</text>

  <text class="muted" x="480" y="388" text-anchor="middle">replace this placeholder with a polished architecture diagram before publishing if needed</text>
</svg>
